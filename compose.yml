services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000/api

    ports:
      - "3000:80"

  backend:
    restart: always
    depends_on:
      - database
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

  database:
    image: postgres:alpine

    env_file:
      - ./database.env
    ports:
      - "5432:5432"
